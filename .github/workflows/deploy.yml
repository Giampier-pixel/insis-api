name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: inisis-api
  REGION: us-central1
  IMAGE: us-central1-docker.pkg.dev/inisis-api/insis-repo/insis-api
  SERVICE: insis-api
  JOB: migrate-job

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/569731688530/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@inisis-api.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: Push image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Run migrations (fresh start — drops old tables, migrates clean)
        run: |
          gcloud run jobs update ${{ env.JOB }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --args="manage.py,fresh_start" \
            --region=${{ env.REGION }}
          gcloud run jobs execute ${{ env.JOB }} \
            --region=${{ env.REGION }} \
            --wait
          gcloud run jobs update ${{ env.JOB }} \
            --args="manage.py,migrate" \
            --region=${{ env.REGION }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed
