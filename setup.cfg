[flake8]
max-line-length = 88
exclude = migrations, __pycache__, .git, venv
extend-ignore = E203, W503

[tool:pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = tests.py test_*.py *_tests.py
addopts = --reuse-db -v

[coverage:run]
source = apps
omit = */migrations/*, */tests/*, */factories.py

[coverage:report]
fail_under = 80
show_missing = true

[isort]
profile = black
known_django = django
known_drf = rest_framework
sections = FUTURE,STDLIB,THIRDPARTY,DJANGO,DRF,FIRSTPARTY,LOCALFOLDER
skip_glob = */migrations/*
